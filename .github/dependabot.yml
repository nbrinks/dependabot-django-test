# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "pip" # Python backend
    directory: "/" # Location of package manifests (requirements*.txt)
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps(pip)"
      include: "scope"
    groups:
      # Security updates - left separate to get focused PRs for each advisory
      security:
        applies-to: security-updates
      # Combine routine non-major prod dependency bumps
      prod-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
        dependency-type: "production"
      prod-major:
        applies-to: version-updates
        update-types:
          - "major"
        dependency-type: "production"
      dev-all:
        applies-to: version-updates
        dependency-type: "development"
